<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | FLOPYTROMP2D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        #unity-container {
            width: 1920px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #unity-canvas {
            width: 1920px;
            height: 1080px;
            object-fit: contain;
        }
        #unity-footer {
            display: none; /* Hide the footer */
        }
        .hide-cursor {
            cursor: none;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
    </div>
    <script>
        var canvas = document.querySelector("#unity-canvas");

        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Unity2DFlap.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/Unity2DFlap.data",
            frameworkUrl: buildUrl + "/Unity2DFlap.framework.js",
            codeUrl: buildUrl + "/Unity2DFlap.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "TEAMMURICA",
            productName: "FLOPYTROMP2D",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                unityInstance.SetFullscreen(1); // Set fullscreen initially
                document.body.addEventListener('click', () => {
                    document.body.classList.add('hide-cursor');
                });
                document.body.addEventListener('mousemove', () => {
                    document.body.classList.remove('hide-cursor');
                    clearTimeout(window.hideCursorTimeout);
                    window.hideCursorTimeout = setTimeout(() => {
                        document.body.classList.add('hide-cursor');
                    }, 2000);
                });
                // Prevent default escape behavior
                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') {
                        event.preventDefault();
                    }
                });
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
