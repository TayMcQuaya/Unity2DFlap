<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | FLOPYTROMP2D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        #unity-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
        }
        #unity-canvas {
            background-color: #000;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .unity-logo {
            display: none;
        }
        .unity-footer {
            display: none;
        }
    </style>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
        var unityInstance;
        window.onload = function() {
            unityInstance = UnityLoader.instantiate("unityContainer", "Build/WebBuild.json", {onProgress: UnityProgress});
        };
    </script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>
    <script>
        function resizeUnityContainer() {
            var mywidth = innerWidth;
            var myheight = innerHeight;
            document.getElementById("unityContainer").style.width = mywidth + "px";
            document.getElementById("unityContainer").style.height = myheight + "px";
        }
        window.addEventListener('resize', resizeUnityContainer);
        resizeUnityContainer();
    </script>
</body>
</html>
